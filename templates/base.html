<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}NFM Platform{% endblock %}</title>
    <style>
        :root {
            --cyan: #00f2fe;
            --dim: #a0aec0;
            --text: #ffffff;
            --bg: #0f172a;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            padding: 0;
        }
        .grid-3 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .btn {
            display: inline-block;
            padding: 10px 20px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: bold;
        }
        .btn-primary {
            background: #2563eb;
            color: white;
        }
        .btn-ghost {
            background: transparent;
            border: 1px solid #475569;
            color: white;
        }
    </style>
</head>
<body>
    {% block content %}
    {% endblock %}
</body>
</html>
